name: Release

# Triggered by pushing a semver tag — `git tag v0.1.0 && git push --tags`.
# Builds the Swift binaries on a macOS Sequoia runner, packages them with the
# Bun CLI + skill + default background, attaches the tarball to a GitHub
# Release with auto-generated notes from commits since the previous tag.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    # macos-15 = Sequoia, which has the Swift toolchain + SwiftUI MeshGradient
    # the recorder uses. macos-latest currently still resolves to 14 (Sonoma)
    # which doesn't have MeshGradient.
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS deps
        run: bun install

      - name: Build Swift binaries
        run: |
          # `pnpm run build` runs the three swiftc invocations sequentially.
          # We use pnpm because that's the convention in package.json scripts
          # (mirrors local dev). corepack ships pnpm with recent Node setups
          # but bun doesn't include it — install explicitly.
          npm install -g pnpm
          pnpm run build

      - name: Verify binaries
        run: |
          file cmd/clicks/clicks cmd/windows/windows cmd/recorder/recorder cmd/gradient-preview/preview
          # Sanity: each binary should be a Mach-O arm64 executable.
          for b in cmd/clicks/clicks cmd/windows/windows cmd/recorder/recorder; do
            file "$b" | grep -q "Mach-O 64-bit executable arm64" || { echo "❌ $b is not arm64 Mach-O"; exit 1; }
          done

      - name: Package release tarball
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          STAGE_DIR="stage-studio-${TAG}"
          ARCHIVE="${STAGE_DIR}-arm64.tar.gz"

          # Stage into a top-level dir so extraction yields `stage-studio-vX.Y.Z/`
          # rather than dumping files into the user's cwd. BSD tar (macOS) doesn't
          # support --transform / --one-top-level, so we copy then tar.
          mkdir -p "$STAGE_DIR"/{cmd/clicks,cmd/windows,cmd/recorder,cmd/gradient-preview,src,assets,.claude/skills}
          cp cmd/clicks/clicks                 "$STAGE_DIR/cmd/clicks/"
          cp cmd/windows/windows               "$STAGE_DIR/cmd/windows/"
          cp cmd/recorder/recorder             "$STAGE_DIR/cmd/recorder/"
          cp cmd/gradient-preview/preview      "$STAGE_DIR/cmd/gradient-preview/"
          cp src/cli.ts                        "$STAGE_DIR/src/"
          cp package.json                      "$STAGE_DIR/"
          cp assets/big-sur-graphic.jpg        "$STAGE_DIR/assets/"
          cp -R .claude/skills/stage-studio    "$STAGE_DIR/.claude/skills/"
          cp README.md LICENSE                 "$STAGE_DIR/"

          tar -czvf "$ARCHIVE" "$STAGE_DIR"

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "STAGE_DIR=$STAGE_DIR" >> "$GITHUB_ENV"
          ls -la "$ARCHIVE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            Apple Silicon (arm64) macOS build.

            ## Install

            ```bash
            curl -L -o stage-studio.tar.gz "https://github.com/thebrubaker/stage-studio/releases/download/${{ env.TAG }}/${{ env.ARCHIVE }}"
            tar -xzf stage-studio.tar.gz
            cd ${{ env.STAGE_DIR }}

            # macOS quarantines unsigned binaries on first run. Strip:
            xattr -dr com.apple.quarantine cmd/ 2>/dev/null || true

            # Install Bun if you don't have it:
            curl -fsSL https://bun.sh/install | bash

            bun install
            ```

            Then follow the README for permission setup and usage.
